<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Akty prawne</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #ffffff;
}

h1 {
    background: #2e7d32;
    color: white;
    padding: 15px;
    margin: 0;
    font-size: 22px;
    text-align: center;
}

.section {
    margin: 15px;
}

.item {
    padding: 15px;
    margin-bottom: 14px;
    background: #f3f3f3;
    border-radius: 6px;
    border: 1px solid #ddd;
}

.title {
    font-size: 18px;
    font-weight: bold;
}

.info {
    font-size: 14px;
    margin-top: 6px;
    color: #444;
}

button {
    margin-top: 10px;
    margin-right: 10px;
    padding: 9px 14px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
button:hover {
    background: #256728;
}
</style>
</head>

<body>

<h1>Akty prawne</h1>

<div class="section" id="list"></div>

<script>
const laws = [

    // --- stare 3 ustawy ---
    {
        title: "Rozporządzenie ws. magazynowania odpadów (2020)",
        pdf: "https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20200001742/O/D20201742.pdf",
        updated: "Dz.U. 2020 poz. 1742"
    },
    {
        title: "Ustawa OOŚ (2008)",
        pdf: "https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20081991227/U/D20081227Lj.pdf",
        updated: "Tekst jednolity (najnowszy na ISAP)"
    },
    {
        title: "Prawo ochrony środowiska (2001)",
        pdf: "https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20010620627/U/D20010627Lj.pdf",
        updated: "Tekst jednolity 2025–2026"
    },

    // --- nowe 3 ustawy z PDF-ów ---

    {
        title: "Prawo wodne (2017)",
        pdf: "Prawo wodne 2017.pdf",
        updated: "aktualizacja: 2025-12-04"
    },
    {
        title: "Ustawa o odpadach (2012)",
        pdf: "Ustawa o odpadach 2012.pdf",
        updated: "aktualizacja: 2025-12-29"
    },
    {
        title: "Zmiana ustawy o odpadach (2021)",
        pdf: "zmiana odpady 2021.pdf",
        updated: "aktualizacja: 2021-11-30"
    }
];

function render() {
    const box = document.getElementById("list");
    box.innerHTML = "";

    laws.forEach(law => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="title">${law.title}</div>
            <div class="info">${law.updated}</div>
            <button onclick="openPDF('${law.pdf}')">Otwórz PDF</button>
            <button onclick="refreshPDF('${law.pdf}')">Odśwież</button>
        `;

        box.appendChild(div);
    });
}

render();

function openPDF(file) {
    window.open(file, "_blank");
}

function refreshPDF(file) {
    const url = file + "?t=" + new Date().getTime();
    window.open(url, "_blank");
}
</script>

</body>
</html>
