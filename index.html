<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POŚ – PDF</title>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#f3f3f3;
}

/* nagłówek */
header {
    background:#1a6fb3;
    color:white;
    padding:18px;
    font-size:22px;
    text-align:center;
}

/* kafelek */
.card {
    width:90%;
    margin:25px auto;
    background:white;
    border-radius:12px;
    padding:20px;
    border:1px solid #ddd;
    cursor:pointer;
}

.card:hover { background:#f0faff; }

.row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.reloadBtn {
    background:#e8f6ff;
    border:1px solid #87c7ff;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
}

#pdfLink {
    color:green;
    font-size:17px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>📘 Prawo ochrony środowiska</header>

<div class="card" id="openCard">
    <div class="row">
        <div style="font-size:20px;font-weight:bold;">Najnowszy Dz.U.</div>
        <button class="reloadBtn" onclick="updatePDF(event)">🔄 Przeładuj</button>
    </div>

    <div id="pdfLink">Ładowanie…</div>
</div>

<script>
// METRYKA POŚ
const METRYKA_URL = "https://isap.sejm.gov.pl/isap.nsf/DocDetails.xsp?id=WDU20010620627";

let currentPDF = "";

// pobieranie najnowszego PDF
async function updatePDF(e) {
    if (e) e.stopPropagation(); // by klik NIE otwierał PDF

    document.getElementById("pdfLink").innerText = "⏳ Pobieranie…";

    try {
        let res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(METRYKA_URL));
        let data = await res.json();
        let html = data.contents;

        let match = html.match(/https:\/\/isap\.sejm\.gov\.pl\/isap\.nsf\/download\.xsp\/[^"]+\.pdf/i);

        if (match) {
            currentPDF = match[0];
            document.getElementById("pdfLink").innerText = currentPDF;
        } else {
            document.getElementById("pdfLink").innerText = "❗ Nie znaleziono PDF";
        }
    } catch {
        document.getElementById("pdfLink").innerText = "❗ Błąd pobierania";
    }
}

// klik całego kafelka = otwarcie PDF
document.getElementById("openCard").onclick = function() {
    if (currentPDF) window.open(currentPDF, "_blank");
};

// automatyczne pobranie po starcie
updatePDF();
</script>

</body>
</html>
``
