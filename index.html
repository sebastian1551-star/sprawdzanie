<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Akty prawne – mobilna wersja</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #ffffff;
}

h1 {
    padding: 15px;
    margin: 0;
    font-size: 22px;
    text-align: center;
    background: #2e7d32;
    color: white;
}

#searchBox {
    width: calc(100% - 30px);
    margin: 15px;
    padding: 12px;
    font-size: 17px;
    border-radius: 6px;
    border: 1px solid #aaa;
}

#list {
    margin: 15px;
}

.item {
    padding: 12px;
    margin-bottom: 10px;
    background: #f3f3f3;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    border: 1px solid #ddd;
}

#status {
    display: none;
    margin: 15px;
    padding: 10px;
    border-left: 4px solid #2e7d32;
    background: #e8f5e9;
}

#refreshBtn {
    display: none;
    margin: 0 15px;
    padding: 10px;
    font-size: 16px;
    border: none;
    background: #2e7d32;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

#viewer {
    display: none;
    margin: 15px;
    width: calc(100% - 30px);
    height: 80vh;
    border: 1px solid #ccc;
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>Akty prawne</h1>

<input id="searchBox" placeholder="Szukaj ustawy...">

<div id="list"></div>

<div id="status"></div>
<button id="refreshBtn">Aktualizuj</button>

<!-- PDF VIEWER -->
<iframe id="viewer"></iframe>

<script>
// ------------------------------
// LISTA 3 USTAW Z TWOICH PDF-ÓW
// ------------------------------

const laws = [
    {
        id: "odpady2020",
        title: "Rozporządzenie ws. magazynowania odpadów (2020)",
        pdf: "https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20200001742/O/D20201742.pdf",
        updated: "Dz.U. 2020 poz. 1742"
    },
    {
        id: "oos2008",
        title: "Ustawa OOŚ (2008)",
        pdf: "https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20081991227/U/D20081227Lj.pdf",
        updated: "Dz.U. 2008 nr 199 poz. 1227"
    },
    {
        id: "pos2001",
        title: "Prawo ochrony środowiska (2001)",
        pdf: "https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20010620627/U/D20010627Lj.pdf",
        updated: "Dz.U. 2001 nr 62 poz. 627"
    }
];

let current = null;

// GENEROWANIE LISTY
function renderList(filter = "") {
    const box = document.getElementById("list");
    box.innerHTML = "";

    laws
        .filter(l => l.title.toLowerCase().includes(filter.toLowerCase()))
        .forEach(law => {
            const div = document.createElement("div");
            div.className = "item";
            div.textContent = law.title;
            div.onclick = () => openLaw(law.id);
            box.appendChild(div);
        });
}

renderList();

// WYSZUKIWARKA
document.getElementById("searchBox").addEventListener("input", e => {
    renderList(e.target.value);
});

// OTWIERANIE PDF-a
function openLaw(id) {
    const law = laws.find(x => x.id === id);
    current = law;

    document.getElementById("status").style.display = "block";
    document.getElementById("status").textContent = "Aktualność: " + law.updated;

    const viewer = document.getElementById("viewer");
    viewer.style.display = "block";
    viewer.src = law.pdf;

    const btn = document.getElementById("refreshBtn");
    btn.style.display = "block";
    btn.onclick = () => viewer.src = law.pdf;
}
</script>

</body>
</html>
