<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ustawy środowiskowe – Sebastian</title>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#f3f3f3;
}
header {
    background:#1a6fb3;
    color:white;
    padding:18px;
    font-size:22px;
    text-align:center;
}
#searchBox {
    width:90%;
    margin:10px auto;
    padding:12px;
    font-size:17px;
    border-radius:5px;
    border:1px solid #ccc;
    display:block;
}
.sectionTitle {
    font-size:20px;
    margin:20px 10px 10px;
    font-weight:bold;
    color:#333;
}
.list button {
    width:90%;
    margin:8px auto;
    display:block;
    padding:15px;
    font-size:18px;
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    text-align:left;
    cursor:pointer;
}
.dark {
    background:#111 !important;
    color:#eee !important;
}
.dark button {
    background:#222 !important;
    color:#eee !important;
}
#modeSwitch {
    position:fixed;
    top:10px;
    right:10px;
    background:#fff;
    border-radius:5px;
    padding:6px 12px;
    border:1px solid #ccc;
    font-size:15px;
}
</style>
</head>

<body>

<header>📘 Ustawy środowiskowe – Sebastian</header>
<button id="modeSwitch">🌙 Tryb nocny</button>

<input id="searchBox" type="text" placeholder="Szukaj ustawy...">

<div id="listContainer">

    <div class="sectionTitle">📚 Podstawowe ustawy</div>
    <div class="list">
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20010620627/U/D20010627Lj.pdf">Prawo ochrony środowiska</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20130000213/U/D20130213Lj.pdf">Ustawa o odpadach</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU19961320622/U/D19960622Lj.pdf">Czystość i porządek w gminach</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20130000888/U/D20130888Lj.pdf">Gospodarka opakowaniami</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20010630639/U/D20010639Lj.pdf">Obowiązki przedsiębiorców</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20081011947/U/D20081947Lj.pdf">Ustawa OOŚ</button>
    </div>

    <div class="sectionTitle">🌿 Ochrona przyrody</div>
    <div class="list">
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20040920920/U/D20040920Lj.pdf">Ochrona przyrody</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20210001698/U/D20211698Lj.pdf">Gatunki obce</button>
    </div>

    <div class="sectionTitle">💧 Wody / Ziemia</div>
    <div class="list">
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20170001569/U/D20171569Lj.pdf">Prawo wodne</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20230001284/U/D20231284Lj.pdf">Remediacja terenów</button>
    </div>

    <div class="sectionTitle">⚡ Energia / Emisje</div>
    <div class="list">
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20150000478/U/D20150478Lj.pdf">Ustawa OZE</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20150000568/U/D20150568Lj.pdf">Handel emisjami</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20120000301/U/D20120301Lj.pdf">Ochrona powietrza</button>
    </div>

    <div class="sectionTitle">🏗 Infrastruktura</div>
    <div class="list">
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20110001630/U/D20111630Lj.pdf">Prawo geologiczne i górnicze</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU20010000318/U/D20010318Lj.pdf">Prawo atomowe</button>
        <button data-url="https://isap.sejm.gov.pl/isap.nsf/download.xsp/WDU19910500403/U/D19910403Lj.pdf">Inspekcja Ochrony Środowiska</button>
    </div>

</div>

<script>
// ------------------ TRYB NOCNY ------------------
let dark = false;
document.getElementById("modeSwitch").onclick = function() {
    dark = !dark;
    document.body.classList.toggle("dark");
    this.innerHTML = dark ? "☀ Jasny tryb" : "🌙 Tryb nocny";
};

// ------------------ WYSZUKIWARKA DZIAŁA ------------------
document.getElementById("searchBox").addEventListener("input", function() {
    const val = this.value.toLowerCase();
    document.querySelectorAll(".list button").forEach(btn => {
        btn.style.display = btn.textContent.toLowerCase().includes(val) ? "block" : "none";
    });
});

// ------------------ KLIK → OTWORZENIE PDF ------------------
document.querySelectorAll(".list button").forEach(btn => {
    btn.addEventListener("click", () => {
        const url = btn.getAttribute("data-url");
        window.open(url, "_blank");
    });
});
</script>

</body>
</html>
